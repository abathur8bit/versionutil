name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }} executable
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            target: linux-x64
            binary_name: versionutil

          - os: macos-15-intel
            label: macOS Intel
            target: macos-x64
            binary_name: versionutil

          - os: macos-latest
            label: macOS Apple Silicon
            target: macos-arm64
            binary_name: versionutil

          - os: windows-latest
            label: Windows
            target: windows-x64
            binary_name: versionutil.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Create dist directory
        run: mkdir dist

      - name: Compile executable
        run: dart compile exe bin/versionutil.dart -o dist/${{ matrix.binary_name }}

      - name: Package release asset (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir package
          cp dist/${{ matrix.binary_name }} README.md LICENSE.txt package/
          cd package
          zip ../versionutil-${{ matrix.target }}.zip *

      - name: Package release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -Path package -ItemType Directory
          Copy-Item -Path dist\${{ matrix.binary_name }}, README.md, LICENSE.txt -Destination package
          Compress-Archive -Path package\* -DestinationPath versionutil-${{ matrix.target }}.zip

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: versionutil-${{ matrix.target }}.zip

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/*.zip
          body_path: CHANGELOG.md